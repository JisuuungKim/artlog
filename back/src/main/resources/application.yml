spring:
  application:
    name: artlog

  servlet:
    multipart:
      max-file-size: ${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:100MB}
      max-request-size: ${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:100MB}

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-test-query: SELECT 1

  jpa:
    database: postgresql
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        default_schema: public

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:change-me-to-a-very-long-random-string-for-jwt-signing}
  access-token-expiration-seconds: ${JWT_ACCESS_TOKEN_EXPIRATION_SECONDS:3600}
  refresh-token-expiration-seconds: ${JWT_REFRESH_TOKEN_EXPIRATION_SECONDS:1209600}

app:
  frontend-base-url: ${FRONTEND_BASE_URL:http://localhost:5173}
  oauth2:
    authorized-redirect-uri: ${OAUTH2_AUTHORIZED_REDIRECT_URI:http://localhost:5173/auth/callback}
    failure-redirect-uri: ${OAUTH2_FAILURE_REDIRECT_URI:http://localhost:5173/auth/login}
  auth:
    refresh-cookie-name: ${REFRESH_COOKIE_NAME:refresh_token}
    refresh-cookie-secure: ${REFRESH_COOKIE_SECURE:true}
  apple:
    audience: ${APPLE_CLIENT_ID:}
    issuer: ${APPLE_ISSUER:https://appleid.apple.com}
    public-key-url: ${APPLE_PUBLIC_KEY_URL:https://appleid.apple.com/auth/keys}
  ai:
    base-url: ${AI_BASE_URL:http://localhost:8001}
    connect-timeout-ms: ${AI_CONNECT_TIMEOUT_MS:5000}
    read-timeout-ms: ${AI_READ_TIMEOUT_MS:1800000}
    max-attempts: ${AI_MAX_ATTEMPTS:2}
    queue:
      poll-delay-ms: ${AI_QUEUE_POLL_DELAY_MS:1000}
      batch-size: ${AI_QUEUE_BATCH_SIZE:3}
  storage:
    upload-dir: ${APP_UPLOAD_DIR:/uploads}

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    root: INFO
    com.artlog: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
