services:
  # 1. PostgreSQL DB 서비스
  db:
    image: postgres:15-alpine
    container_name: artlog-db
    restart: always
    environment:
      POSTGRES_USER: artlog_user
      POSTGRES_PASSWORD: artlog_password
      POSTGRES_DB: artlog_db
    ports:
      - "5432:5432"
    volumes:
      - ./back/postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U artlog_user -d artlog_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: artlog-redis
    restart: always
    ports:
      - "6379:6379"

  # 2. Spring Boot 애플리케이션 서비스
  app:
    build:
      context: ./back
      target: dev
    container_name: artlog-app
    working_dir: /app
    command: ["./gradlew", "bootRun", "--continuous"]
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - ./back/.env
    environment:
      AI_BASE_URL: http://ai:8001
    volumes:
      - ./back:/app
      - ./uploads:/uploads
      - gradle-cache:/root/.gradle
    restart: unless-stopped

  # 3. AI Agent 서비스 (FastAPI + LangGraph)
  ai:
    build: ./ai
    container_name: artlog-ai
    ports:
      - "8001:8001"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./ai/.env
    volumes:
      - ./ai:/app             # Mount the entire /ai folder to /app inside the container
      - ./uploads:/uploads    # 오디오 파일 마운트 (test.m4a 등)
    restart: on-failure

  front:
    build: ./front
    container_name: artlog-front
    working_dir: /app
    command: ["sh", "-lc", "npm install && npm run dev -- --host 0.0.0.0 --port 5173"]
    ports:
      - "5173:5173"
    depends_on:
      - app
    environment:
      VITE_API_BASE_URL: http://localhost:8080
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./front:/app
      - front-node-modules:/app/node_modules
    restart: unless-stopped

volumes:
  gradle-cache:
  front-node-modules:
